<!DOCTYPE html><html lang="ro"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Site de prezentare</title>
<style>
:root{color-scheme:dark}*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}body{font-family:-apple-system,Segoe UI,Helvetica,Arial,sans-serif;background:#0b1220;color:#e5e7eb;line-height:1.6;overflow-x:hidden}
img{max-width:100%}[id]{scroll-margin-top:70px}
.acc{color:var(--a)}
.nav{position:fixed;top:0;left:0;right:0;z-index:30;transition:.3s}
.nav.solid{background:rgba(11,18,32,.92);backdrop-filter:blur(10px);border-bottom:1px solid #1e293b}
.navin{max-width:1140px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:16px 22px}
.brand{font-weight:800;font-size:15px;letter-spacing:.3px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%}
.brand .d{color:var(--a)}
.links{display:flex;gap:24px;align-items:center}
.links a{color:#cbd5e1;text-decoration:none;font-size:14px;font-weight:600}
.links a.tel{color:#fff}.links a.tel b{color:#22c55e}
.navcta{background:var(--a);color:#06121f!important;padding:9px 16px;border-radius:10px;font-weight:700}
.burger{display:none;background:none;border:none;color:#fff;font-size:26px;cursor:pointer}
.hero{min-height:100vh;display:flex;align-items:center;position:relative;overflow:hidden}
.hero video,.hero .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.hero .ov{position:absolute;inset:0;background:linear-gradient(90deg,rgba(7,14,26,.86),rgba(7,14,26,.55) 60%,rgba(7,14,26,.35));z-index:1}
.hero .in{position:relative;z-index:2;max-width:1140px;margin:0 auto;padding:0 22px;width:100%}
.eyebrow{color:var(--a);font-weight:700;letter-spacing:2px;font-size:13px;margin-bottom:18px}
.eyebrow .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--a);margin-right:8px}
.hero h1{font-size:clamp(44px,8vw,92px);font-weight:800;line-height:.98;color:#fff;letter-spacing:-1px;text-transform:uppercase}
.hero h1 .l2{color:var(--a)}
.hero p.lead{max-width:520px;margin:24px 0 0;color:#cbd5e1;font-size:17px}
.hbtn{margin-top:30px;display:flex;gap:14px;flex-wrap:wrap}
.hbtn a{text-decoration:none;font-weight:700;padding:15px 26px;border-radius:12px;font-size:15px}
.bp{background:var(--a);color:#06121f}.bo{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.4)}
.trust{background:#0e1729;border-top:1px solid #1e293b;border-bottom:1px solid #1e293b}
.trustin{max-width:1140px;margin:0 auto;padding:20px 22px;display:flex;flex-wrap:wrap;gap:26px;justify-content:space-between}
.tb{display:flex;align-items:center;gap:10px;font-size:14px;color:#cbd5e1}.tb .e{font-size:20px}.tb b{color:#fff}
.sec{max-width:1140px;margin:0 auto;padding:84px 22px}
.kicker{color:var(--a);font-weight:700;letter-spacing:2px;font-size:13px}
.sec h2{font-size:clamp(28px,4vw,40px);font-weight:800;color:#fff;margin:8px 0 14px;text-transform:uppercase;letter-spacing:-.5px}
.sec .intro{color:#94a3b8;max-width:680px;font-size:16px}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:38px}
.svc{background:#0e1729;border:1px solid #1e293b;border-radius:18px;padding:26px;transition:.2s}
.svc:hover{border-color:var(--a);transform:translateY(-4px)}
.svc .no{color:#334155;font-weight:800;font-size:14px}.svc .e{font-size:30px;margin:6px 0 12px}
.svc h3{color:#fff;font-size:19px;margin-bottom:6px}.svc p{color:#94a3b8;font-size:14.5px}
.stats{background:linear-gradient(135deg,#0e1729,#0b1220);border-top:1px solid #1e293b;border-bottom:1px solid #1e293b}
.statin{max-width:1140px;margin:0 auto;padding:54px 22px;display:grid;grid-template-columns:repeat(4,1fr);gap:20px;text-align:center}
.stat .n{font-size:42px;font-weight:800;color:#fff}.stat .n b{color:var(--a)}.stat .l{color:#94a3b8;font-size:14px;margin-top:4px}
.band{position:relative;min-height:46vh;display:flex;align-items:center;background-size:cover;background-position:center}
.band .ov{position:absolute;inset:0;background:rgba(7,14,26,.6)}.band .in{position:relative;z-index:2;max-width:1140px;margin:0 auto;padding:40px 22px}
.band h2{color:#fff}
.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:38px}
.step{position:relative;padding:24px;background:#0e1729;border:1px solid #1e293b;border-radius:18px}
.step .no{font-size:34px;font-weight:800;color:var(--a);opacity:.5}.step h3{color:#fff;font-size:17px;margin:8px 0 5px}.step p{color:#94a3b8;font-size:14px}
.gal{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:38px}
.gal img{width:100%;height:300px;object-fit:cover;border-radius:18px}
.revs{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:38px}
.rev{background:#0e1729;border:1px solid #1e293b;border-radius:18px;padding:24px}
.rev .st{color:#f59e0b;margin-bottom:10px}.rev p{color:#cbd5e1;font-size:15px}
.rev .who{display:flex;align-items:center;gap:12px;margin-top:16px}
.rev .av{width:40px;height:40px;border-radius:50%;background:var(--a);color:#06121f;display:flex;align-items:center;justify-content:center;font-weight:800}
.rev .who b{color:#fff;display:block;font-size:14px}.rev .who span{color:#94a3b8;font-size:12px}
.cta{background:linear-gradient(135deg,var(--c2),#0b1220)}
.ctain{max-width:1140px;margin:0 auto;padding:74px 22px;text-align:center}
.cta h2{color:#fff;font-size:clamp(28px,4vw,42px);text-transform:uppercase}
.cta p{color:#dbeafe;margin-top:10px}
.cbtns{margin-top:28px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.cbtns a{text-decoration:none;font-weight:700;padding:16px 28px;border-radius:13px;font-size:16px}
.cwa{background:#22c55e;color:#fff}.cph{background:#fff;color:#0b1220}
footer{background:#070e1a;border-top:1px solid #1e293b}
.fin{max-width:1140px;margin:0 auto;padding:50px 22px;display:grid;grid-template-columns:repeat(3,1fr);gap:30px}
.fin h4{color:var(--a);font-size:13px;letter-spacing:1px;margin-bottom:10px}.fin p,.fin a{color:#94a3b8;font-size:14px;text-decoration:none;display:block;margin-bottom:5px}
.fcopy{border-top:1px solid #1e293b;text-align:center;color:#64748b;font-size:12.5px;padding:18px}
.scta{position:fixed;left:0;right:0;bottom:0;z-index:25;display:none;gap:8px;padding:10px 12px;background:rgba(11,18,32,.95);border-top:1px solid #1e293b}
.scta a{flex:1;text-align:center;text-decoration:none;font-weight:700;padding:13px;border-radius:11px;font-size:15px}
@media(max-width:860px){.cards,.steps,.statin,.revs,.fin{grid-template-columns:1fr}.gal{grid-template-columns:1fr}
 .links{display:none;position:absolute;top:60px;left:0;right:0;background:#0b1220;flex-direction:column;align-items:flex-start;padding:18px 22px;gap:16px;border-bottom:1px solid #1e293b}
 .links.open{display:flex}.navcta{width:100%;text-align:center}.burger{display:block}
 .hero .ov{background:linear-gradient(rgba(7,14,26,.55),rgba(7,14,26,.8))}.scta{display:flex}}
</style></head><body>
