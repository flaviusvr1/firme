<title>Site de prezentare</title>
<style>
:root{color-scheme:light}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,Segoe UI,Helvetica,Arial,sans-serif;color:#1f2937;background:#fff;line-height:1.55}
.hero{padding:64px 22px 56px;color:#fff;text-align:center;background:linear-gradient(135deg,var(--c1),var(--c2))}
.badge{display:inline-block;background:rgba(255,255,255,.2);padding:6px 14px;border-radius:999px;font-size:13px;letter-spacing:.5px;margin-bottom:14px}
.hero h1{font-size:34px;font-weight:800;line-height:1.15}
.hero .sub{font-size:17px;opacity:.95;margin-top:10px;max-width:560px;margin-left:auto;margin-right:auto}
.cta{margin-top:26px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.cta a{text-decoration:none;font-weight:700;padding:13px 22px;border-radius:12px;font-size:15px}
.b1{background:#fff;color:var(--c2)}
.b2{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.55)}
.wrap{max-width:880px;margin:0 auto;padding:48px 22px}
.sec h2{font-size:24px;font-weight:800;margin-bottom:8px}
.sec p.lead{color:#4b5563;font-size:16px;max-width:680px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-top:26px}
.card{background:#f9fafb;border:1px solid #eef0f3;border-radius:16px;padding:22px}
.card .ic{width:42px;height:42px;border-radius:12px;background:var(--soft);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--c2);font-size:18px;margin-bottom:12px}
.card h3{font-size:17px;margin-bottom:5px}
.card p{color:#6b7280;font-size:14px}
.contact{background:#0f172a;color:#e5e7eb}
.contact .wrap{padding:46px 22px}
.contact h2{color:#fff}
.crow{display:flex;flex-wrap:wrap;gap:14px;margin-top:22px}
.crow a{flex:1;min-width:160px;text-align:center;text-decoration:none;font-weight:700;padding:15px;border-radius:13px;font-size:15px}
.call{background:#22c55e;color:#fff}.map{background:#1d4ed8;color:#fff}
.rev{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);padding:8px 14px;border-radius:999px;margin-top:14px;font-size:14px}
.star{color:#fbbf24}
footer{background:#0b1220;color:#94a3b8;text-align:center;padding:26px 18px;font-size:13px}
footer b{color:#cbd5e1}
@media(max-width:520px){.hero h1{font-size:28px}.hero{padding:52px 18px 44px}}
</style></head><body>
